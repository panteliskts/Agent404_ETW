services:
  - type: web
    name: logicvolt-api
    runtime: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_COOKIE_SECURE
        value: "true"
      - key: APP_AUTH_USERNAME
        sync: false
      - key: APP_AUTH_PASSWORD
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: APP_ALLOWED_ORIGINS
        sync: false
      - key: APP_ALLOWED_HOSTS
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      - key: ENTSOE_API_KEY
        sync: false
