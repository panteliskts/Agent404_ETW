# ─────────────────────────────────────────────────────────────────────────────
# BESS Optimizer — nginx reverse-proxy
#
# Topology
# --------
#   Internet → nginx (443 TLS) → Next.js frontend (:3000)
#                              → FastAPI backend  (:8000)
#
# Certificates
# ------------
# Replace /etc/ssl/bess/... paths with your certificate paths.
# For Let's Encrypt use certbot: certbot --nginx -d bess.example.com
#
# To test the TLS grade: https://www.ssllabs.com/ssltest/
# ─────────────────────────────────────────────────────────────────────────────

# ── global ───────────────────────────────────────────────────────────────────
user              nginx;
worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;

    # ── TLS shared config ─────────────────────────────────────────────────────
    ssl_protocols             TLSv1.3;          # TLS 1.3 only — no 1.0/1.1/1.2
    ssl_prefer_server_ciphers off;              # TLS 1.3 ignores this; kept for clarity
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;              # Forward-secrecy: disable session tickets

    # OCSP stapling for faster certificate validation
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── rate limiting zones ────────────────────────────────────────────────────
    # General API: 60 req/min per IP (burst of 20 without delay)
    limit_req_zone $binary_remote_addr zone=api:10m       rate=60r/m;
    # Login endpoint: 8 req/min per IP (matches APP_LOGIN_RATE_LIMIT_REQUESTS)
    limit_req_zone $binary_remote_addr zone=login:10m     rate=8r/m;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name bess.example.com;

        # Allow ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — main application ───────────────────────────────────────────────
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name bess.example.com;

        ssl_certificate     /etc/ssl/bess/fullchain.pem;
        ssl_certificate_key /etc/ssl/bess/privkey.pem;
        ssl_trusted_certificate /etc/ssl/bess/chain.pem;

        # ── security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
        # CSP is set per-location below (API vs frontend have different needs).

        # Hide nginx version from error pages
        server_tokens off;

        # ── WebSocket upgrade map ─────────────────────────────────────────────
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # ── FastAPI backend (/api/* and /auth/*) ──────────────────────────────
        location ~ ^/(api|auth|health|status|forecast|optimize|feature-importance|audit|api-keys)(/|$) {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
        }

        # Tighter rate limit on the login endpoint
        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Next.js frontend (everything else) ────────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Next.js sets its own CSP via next.config.mjs — don't override here.
        }

        # ── WSS (WebSocket Secure) for live price streaming ───────────────────
        location /ws/ {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;    # Keep long-lived WebSocket connections alive
        }

        # ── deny hidden files (.env, .git, etc.) ──────────────────────────────
        location ~ /\. {
            deny all;
        }
    }
}
